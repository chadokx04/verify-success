<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email Verified</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f5f7;
    color: #1c1c1e;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f5f5f7; }
  }
  .card {
    max-width: 420px;
    margin: 24px;
    padding: 32px;
    border-radius: 16px;
    text-align: center;
    background: #ffffff;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    .card { background: #2c2c2e; box-shadow: none; }
  }
  .check {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { font-size: 15px; line-height: 1.5; opacity: 0.8; margin: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Email verified</h1>
    <p>Your account is confirmed. You can close this page and log in from the Errand Service app.</p>
  </div>
</body>
</html>
